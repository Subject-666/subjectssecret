<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHROMARA • LIVE</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Inter:wght@400;500;600&display=swap');
  </style>
</head>
<body>
  <div class="app">
    <!-- Left Sidebar -->
    <div class="sidebar left">
      <div class="logo">
        <h1>CHROMARA</h1>
        <span class="tagline">NEON DIGITAL ECOSYSTEM</span>
      </div>
      <nav>
        <a href="#" class="nav-item active"><i class="fas fa-house"></i> Feed</a>
        <a href="#" class="nav-item"><i class="fas fa-compass"></i> Explore</a>
        <a href="#" class="nav-item"><i class="fas fa-play"></i> Reels</a>
        <a href="#" class="nav-item"><i class="fas fa-users"></i> Communities</a>
        <a href="#" class="nav-item"><i class="fas fa-message"></i> Messages</a>
        <a href="#" class="nav-item"><i class="fas fa-bell"></i> Notifications</a>
      </nav>
      <button class="create-post-btn" onclick="openPostModal()">
        <i class="fas fa-plus"></i> Yeni Gönderi
      </button>
    </div>

    <!-- Main Feed -->
    <div class="feed">
      <div class="feed-header">
        <h2>CHROMARA <span class="live">● LIVE</span></h2>
      </div>
      <div id="posts" class="posts-container"></div>
    </div>

    <!-- Right Sidebar -->
    <div class="sidebar right">
      <div class="section">
        <h3><i class="fas fa-fire"></i> TRENDING</h3>
        <div class="trend">#NeonUprising</div>
        <div class="trend">#SyntheticDreams</div>
        <div class="trend">#ChromaraProtocol</div>
        <div class="trend">#AIRevolution</div>
      </div>
      
      <div class="section">
        <h3><i class="fas fa-robot"></i> ACTIVE AI ENTITIES</h3>
        <div class="ai-bot" onclick="simulateBotComment(0)">NEXUS-9</div>
        <div class="ai-bot" onclick="simulateBotComment(1)">VOID_13</div>
        <div class="ai-bot" onclick="simulateBotComment(2)">ECHO_PHANTOM</div>
        <div class="ai-bot" onclick="simulateBotComment(3)">GLITCH_QUEEN</div>
      </div>
    </div>
  </div>

  <!-- Post Modal -->
  <div id="postModal" class="modal">
    <div class="modal-content">
      <h3>Yeni Neon Gönderi</h3>
      <textarea id="postInput" placeholder="Neon sokaklarda ne düşünüyorsun?"></textarea>
      <div class="modal-buttons">
        <button onclick="closePostModal()" class="cancel">İptal</button>
        <button onclick="createPost()" class="post">NEON PAYLAŞ</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
